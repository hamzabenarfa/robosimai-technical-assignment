services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: robosim
      POSTGRES_PASSWORD: robosim
      POSTGRES_DB: robosim
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robosim -d robosim"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://robosim:robosim@postgres:5432/robosim
      CORS_ORIGINS: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres-data:
